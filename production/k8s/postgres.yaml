---
# PostgreSQL Service (for database access)
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: customer-success-fte
  labels:
    app: postgres
spec:
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  clusterIP: None
---
# PostgreSQL StatefulSet with pgvector extension
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: customer-success-fte
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      initContainers:
        - name: init-schema
          image: postgres:15
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for primary PostgreSQL to start..."
              sleep 20
              PGPASSWORD=fte_password psql -h postgres -U fte -d fte_db -f /schema/001_initial_schema.sql
          volumeMounts:
            - name: schema-files
              mountPath: /schema
      containers:
        - name: postgres
          image: pgvector/pgvector:pg15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "fte"
            - name: POSTGRES_PASSWORD
              value: "fte_password"
            - name: POSTGRES_DB
              value: "fte_db"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: schema-files
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "fte"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "fte"]
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: schema-files
          configMap:
            name: schema-files-cm
        - name: db-sql
          emptyDir: {}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: customer-success-fte
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: schema-files-cm
  namespace: customer-success-fte
data:
  001_initial_schema.sql: |
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    CREATE EXTENSION IF NOT EXISTS "vector";
    CREATE EXTENSION IF NOT EXISTS "pgcrypto";
    CREATE TABLE IF NOT EXISTS customers (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), email VARCHAR(255), phone VARCHAR(50), name VARCHAR(255), company VARCHAR(255), tier VARCHAR(20) DEFAULT 'starter', created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(), updated_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(), metadata JSONB DEFAULT '{}', UNIQUE(email), UNIQUE(phone));
    CREATE TABLE IF NOT EXISTS customer_identifiers (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), customer_id UUID REFERENCES customers(id) ON DELETE CASCADE, identifier_type VARCHAR(50) NOT NULL, identifier_value VARCHAR(255) NOT NULL, verified BOOLEAN DEFAULT FALSE, created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(), UNIQUE(identifier_type, identifier_value));
    CREATE INDEX IF NOT EXISTS idx_ci_customer ON customer_identifiers(customer_id);
    CREATE INDEX IF NOT EXISTS idx_ci_value ON customer_identifiers(identifier_value);
    CREATE TABLE IF NOT EXISTS conversations (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), customer_id UUID REFERENCES customers(id) ON DELETE SET NULL, initial_channel VARCHAR(50) NOT NULL, started_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(), ended_at TIMESTAMP WITH TIME ZONE, status VARCHAR(50) DEFAULT 'active', sentiment_score DECIMAL(3,2), resolution_type VARCHAR(50), escalated_to VARCHAR(255), subject TEXT, metadata JSONB DEFAULT '{}');
    CREATE INDEX IF NOT EXISTS idx_conv_customer ON conversations(customer_id);
    CREATE INDEX IF NOT EXISTS idx_conv_status ON conversations(status);
    CREATE INDEX IF NOT EXISTS idx_conv_channel ON conversations(initial_channel);
    CREATE TABLE IF NOT EXISTS messages (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), conversation_id UUID REFERENCES conversations(id) ON DELETE CASCADE, channel VARCHAR(50) NOT NULL, direction VARCHAR(20) NOT NULL, role VARCHAR(20) NOT NULL, content TEXT NOT NULL, created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(), tokens_used INTEGER, latency_ms INTEGER, tool_calls JSONB DEFAULT '[]', channel_message_id VARCHAR(255), delivery_status VARCHAR(50) DEFAULT 'pending', sentiment_score DECIMAL(3,2), metadata JSONB DEFAULT '{}');
    CREATE INDEX IF NOT EXISTS idx_msg_conv ON messages(conversation_id);
    CREATE INDEX IF NOT EXISTS idx_msg_channel ON messages(channel);
    CREATE TABLE IF NOT EXISTS tickets (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), conversation_id UUID REFERENCES conversations(id) ON DELETE SET NULL, customer_id UUID REFERENCES customers(id) ON DELETE SET NULL, source_channel VARCHAR(50) NOT NULL, category VARCHAR(100), priority VARCHAR(20) DEFAULT 'medium', status VARCHAR(50) DEFAULT 'open', created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(), resolved_at TIMESTAMP WITH TIME ZONE, resolution_notes TEXT, escalation_reason TEXT, subject TEXT NOT NULL, metadata JSONB DEFAULT '{}');
    CREATE INDEX IF NOT EXISTS idx_ticket_status ON tickets(status);
    CREATE INDEX IF NOT EXISTS idx_ticket_channel ON tickets(source_channel);
    CREATE TABLE IF NOT EXISTS knowledge_base (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), title VARCHAR(500) NOT NULL, content TEXT NOT NULL, category VARCHAR(100), embedding vector(1536), created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(), updated_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(), is_active BOOLEAN DEFAULT TRUE);
    CREATE INDEX IF NOT EXISTS idx_kb_category ON knowledge_base(category);
    CREATE TABLE IF NOT EXISTS channel_configs (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), channel VARCHAR(50) UNIQUE NOT NULL, enabled BOOLEAN DEFAULT TRUE, config JSONB NOT NULL, response_template TEXT, max_response_length INTEGER, rate_limit_per_minute INTEGER DEFAULT 60, created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(), updated_at TIMESTAMP WITH TIME ZONE DEFAULT NOW());
    CREATE TABLE IF NOT EXISTS agent_metrics (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), metric_name VARCHAR(100) NOT NULL, metric_value DECIMAL(10,4) NOT NULL, channel VARCHAR(50), dimension_type VARCHAR(50), dimensions JSONB DEFAULT '{}', recorded_at TIMESTAMP WITH TIME ZONE DEFAULT NOW());
    INSERT INTO channel_configs (channel, enabled, config, max_response_length) VALUES ('email', true, '{"smtp_from": "support@flowsync.com"}', 3000) ON CONFLICT (channel) DO NOTHING;
    INSERT INTO channel_configs (channel, enabled, config, max_response_length) VALUES ('whatsapp', true, '{"twilio_from": "whatsapp:+14155238886"}', 1600) ON CONFLICT (channel) DO NOTHING;
    INSERT INTO channel_configs (channel, enabled, config, max_response_length) VALUES ('web_form', true, '{"auto_reply": true}', 1800) ON CONFLICT (channel) DO NOTHING;
