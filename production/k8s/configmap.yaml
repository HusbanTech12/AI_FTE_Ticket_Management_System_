---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fte-config
  namespace: customer-success-fte
data:
  # Application Configuration
  LOG_LEVEL: "INFO"
  DEBUG: "false"
  PORT: "8000"
  ALLOWED_ORIGINS: "*"

  # Database
  DATABASE_URL: "postgresql://fte:fte_password@postgres.customersuccessfte.svc.cluster.local:5432/fte_db"

  # Kafka
  KAFKA_BOOTSTRAP_SERVERS: "kafka.customersuccessfte.svc.cluster.local:9092"

  # OpenAI Model
  OPENAI_MODEL: "gpt-4o"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fte-scripts
  namespace: customer-success-fte
data:
  wait-for-dependencies.sh: |
    #!/bin/sh
    set -e

    echo "Waiting for PostgreSQL..."
    while ! nc -z postgres 5432; do
      sleep 1
    done
    echo "PostgreSQL is ready"

    echo "Waiting for Kafka..."
    while ! nc -z kafka 9092; do
      sleep 1
    done
    echo "Kafka is ready"

    echo "All dependencies ready. Starting application..."
