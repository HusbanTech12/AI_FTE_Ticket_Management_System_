---
apiVersion: v1
kind: Secret
metadata:
  name: fte-secrets
  namespace: customer-success-fte
type: Opaque
stringData:
  # OpenAI API Key (REQUIRED)
  # Replace INSERT_OPENAI_API_KEY with your actual key
  OPENAI_API_KEY: "INSERT_OPENAI_API_KEY"

  # Twilio Configuration (REQUIRED for WhatsApp)
  # Replace placeholders with actual values from Twilio console
  TWILIO_ACCOUNT_SID: "INSERT_TWILIO_ACCOUNT_SID"
  TWILIO_AUTH_TOKEN: "INSERT_TWILIO_AUTH_TOKEN"
  TWILIO_WHATSAPP_NUMBER: "whatsapp:+14155238886"

  # Gmail Service Account (OPTIONAL - only if using email channel)
  # Mount as file in /secrets/gmail-credentials.json
  # To create: kubectl create secret generic fte-gmail-secret \
  #   --from-file=gmail-credentials.json=./path/to/service-account.json \
  #   -n customer-success-fte

  # Application Secret Key (for any crypto operations)
  SECRET_KEY: "change-me-in-production-to-a-strong-random-secret-key"
